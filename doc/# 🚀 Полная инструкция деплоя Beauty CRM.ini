# Полная инструкция деплоя Beauty CRM (CRM-only)

Текущий репозиторий работает только с контуром `crm/`.
Папки `site/backend` и `site/frontend` в этом дереве больше нет, поэтому все команды ниже только для `crm/backend` и `crm/frontend`.

## 1) Очистить сервер и залить свежий код

```bash
ssh ubuntu@91.201.215.32
cd /home/ubuntu/beauty_crm
rm -rf ./*
exit
```

После выхода с сервера выполните на Mac:

```bash
rsync -avz --progress \
  --exclude 'venv' \
  --exclude 'node_modules' \
  --exclude '.git' \
  --exclude '__pycache__' \
  --exclude 'crm/backend/static' \
  ~/Desktop/beauty-crm/ ubuntu@91.201.215.32:/home/ubuntu/beauty_crm/
```

## 2) Установка backend зависимостей на сервере

Подключитесь на сервер:

```bash
ssh ubuntu@91.201.215.32
```

Полная переустановка:

```bash
cd /home/ubuntu/beauty_crm/crm/backend
rm -rf venv
which python3
which python
unalias python
unalias pip
python3 -m venv venv
source venv/bin/activate
python3 -m pip install --upgrade pip
pip install -r requirements.txt
# Optional import/export/PDF/Excel/image stack:
# pip install -r requirements-optional.txt
export BACKEND_WORKERS=${BACKEND_WORKERS:-4}
export BACKEND_THREAD_POOL_WORKERS=${BACKEND_THREAD_POOL_WORKERS:-24}
gunicorn main:app \
  -k uvicorn.workers.UvicornWorker \
  --workers "${BACKEND_WORKERS}" \
  --bind "0.0.0.0:${PORT:-8001}" \
  --timeout 120 \
  --keep-alive 10
```

Короткая версия:

```bash
cd /home/ubuntu/beauty_crm/crm/backend
source venv/bin/activate
export BACKEND_WORKERS=${BACKEND_WORKERS:-4}
export BACKEND_THREAD_POOL_WORKERS=${BACKEND_THREAD_POOL_WORKERS:-24}
gunicorn main:app \
  -k uvicorn.workers.UvicornWorker \
  --workers "${BACKEND_WORKERS}" \
  --bind "0.0.0.0:${PORT:-8001}" \
  --timeout 120 \
  --keep-alive 10
```

## 3) Установка frontend зависимостей на сервере

```bash
cd /home/ubuntu/beauty_crm/crm/frontend
npm cache clean --force
npm install --no-audit --prefer-offline --verbose
```

## 4) Перезапуск сервисов на сервере

Если backend service называется `beauty-crm-crm`:

```bash
sudo systemctl daemon-reload
sudo systemctl restart beauty-crm-crm
sudo systemctl restart nginx
sudo journalctl -u beauty-crm-crm -f
```

Если у вас пока старое имя unit `beauty_crm`:

```bash
sudo systemctl daemon-reload
sudo systemctl restart beauty_crm
sudo systemctl restart nginx
sudo journalctl -u beauty_crm -f
```

## 5) Локальный запуск CRM вручную

Backend, полная переустановка:

```bash
