rm -rf venv
which python3
which python
unalias python
unalias pip
python3 -m venv venv
source venv/bin/activate
python3 -m pip install --upgrade pip
pip install -r requirements.txt
# Optional import/export/PDF/Excel/image/document stack:
# pip install -r requirements-optional.txt
