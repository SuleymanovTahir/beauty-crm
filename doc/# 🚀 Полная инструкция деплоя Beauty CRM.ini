```

## 6) Локальный запуск одной командой

Текущий запускной скрипт поддерживает только CRM:

```bash
bash /Users/tahir/Desktop/beauty-crm/scripts/run_local.sh
```

То же самое, но с явным режимом:

```bash
bash /Users/tahir/Desktop/beauty-crm/scripts/run_local.sh crm
```

Что делает скрипт:

- поднимает `crm/backend` и `crm/frontend`,
- для backend по умолчанию использует `BACKEND_WORKERS=1 BACKEND_THREAD_POOL_WORKERS=8 BACKEND_RELOAD=false`,
- корректно завершает поднятые процессы по `Ctrl+C`.

Локальный frontend CRM:

- `http://localhost:5173`

Если нужно переопределить backend-настройки на один запуск:

```bash
BACKEND_WORKERS=2 BACKEND_THREAD_POOL_WORKERS=16 BACKEND_RELOAD=false bash /Users/tahir/Desktop/beauty-crm/scripts/run_local.sh crm
```

